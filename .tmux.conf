# better prefix
set-option -g prefix C-a

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator

# decide whether we're in a Vim process
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -n 'C-Space' if-shell "$is_vim" 'send-keys C-Space' 'select-pane -t:.+'

bind-key -T copy-mode-vi 'M-h' select-pane -L
bind-key -T copy-mode-vi 'M-j' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-l' select-pane -R
bind-key -T copy-mode-vi 'M-\' select-pane -l
bind-key -T copy-mode-vi 'M-Space' select-pane -t:.+


# colors
set -g default-terminal "screen-256color"

set -g status-bg black
set -g status-fg white

# superior 1-based indexing
set -g base-index 1

# switch windows alt+number
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# swap windows alt+shift+numberbind -n M-! if-shell "tmux display-message -p -t :1 '#{window_index}' >/dev/null 2>&1" "swap-window -t 1 \; select-window -t 1" "move-window -t 1 \; select-window -t 1"
bind -n M-@ if-shell "tmux display-message -p -t :2 '#{window_index}' >/dev/null 2>&1" "swap-window -t 2 \; select-window -t 2" "move-window -t 2 \; select-window -t 2"
bind -n M-# if-shell "tmux display-message -p -t :3 '#{window_index}' >/dev/null 2>&1" "swap-window -t 3 \; select-window -t 3" "move-window -t 3 \; select-window -t 3"
bind -n M-$ if-shell "tmux display-message -p -t :4 '#{window_index}' >/dev/null 2>&1" "swap-window -t 4 \; select-window -t 4" "move-window -t 4 \; select-window -t 4"
bind -n M-% if-shell "tmux display-message -p -t :5 '#{window_index}' >/dev/null 2>&1" "swap-window -t 5 \; select-window -t 5" "move-window -t 5 \; select-window -t 5"
bind -n M-^ if-shell "tmux display-message -p -t :6 '#{window_index}' >/dev/null 2>&1" "swap-window -t 6 \; select-window -t 6" "move-window -t 6 \; select-window -t 6"
bind -n M-& if-shell "tmux display-message -p -t :7 '#{window_index}' >/dev/null 2>&1" "swap-window -t 7 \; select-window -t 7" "move-window -t 7 \; select-window -t 7"
bind -n M-* if-shell "tmux display-message -p -t :8 '#{window_index}' >/dev/null 2>&1" "swap-window -t 8 \; select-window -t 8" "move-window -t 8 \; select-window -t 8"
bind -n M-( if-shell "tmux display-message -p -t :9 '#{window_index}' >/dev/null 2>&1" "swap-window -t 9 \; select-window -t 9" "move-window -t 9 \; select-window -t 9"
bind -n M-) if-shell "tmux display-message -p -t :0 '#{window_index}' >/dev/null 2>&1" "swap-window -t 0 \; select-window -t 0" "move-window -t 0 \; select-window -t 0"

# Enable mouse mode for resizing/scrolling
set -g mouse on

# Easier splitting & closing
bind v split-window -h
bind s split-window -v
bind x kill-pane
bind n new-window

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

